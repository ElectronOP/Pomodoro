<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electron's Timepiece</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@200;300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: rgb(95, 168, 227);
  --accent-dim: rgba(95, 168, 227, 0.18);
  --accent-glow: rgba(95, 168, 227, 0.35);
  --accent-soft: rgba(95, 168, 227, 0.08);
  --glass-bg: rgba(8, 14, 28, 0.45);
  --glass-border: rgba(95, 168, 227, 0.15);
  --glass-border-bright: rgba(95, 168, 227, 0.35);
  --text: rgba(230, 240, 255, 0.95);
  --text-muted: rgba(160, 185, 215, 0.7);
  --text-dim: rgba(120, 150, 185, 0.5);
  --green: rgb(80, 220, 150);
  --red: rgb(220, 90, 90);
  --surface-inner: rgba(5, 10, 22, 0.55);
}

html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Outfit', sans-serif;
  color: var(--text);
  background: #050a1a;
}

.bg-layer {
  position: fixed;
  inset: 0;
  background: url('https://i.pinimg.com/1200x/61/4a/e6/614ae6507c9b419b18ee142512b07932.jpg') center/cover no-repeat;
  z-index: 0;
}

.bg-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, rgba(4,8,20,0.52) 0%, rgba(4,8,20,0.38) 40%, rgba(4,8,20,0.55) 100%);
  z-index: 1;
}

header {
  position: fixed;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  width: min(680px, calc(100vw - 2rem));
  max-width: calc(100vw - 2rem);
}

.header-stack {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.header-pill {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1.5rem;
  width: 100%;
  padding: 10px 10px 10px 20px;
  background: rgba(6,12,28,0.72);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 100px;
  box-shadow:
    0 0 0 1px rgba(95,168,227,0.08),
    0 8px 20px rgba(0,0,0,0.45),
    0 18px 45px rgba(0,0,0,0.38),
    0 2px 8px rgba(95,168,227,0.12),
    inset 0 1px 0 rgba(255,255,255,0.06);
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-atom {
  width: 30px;
  height: 30px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-atom::before,
.logo-atom::after {
  content: '';
  position: absolute;
  width: 28px;
  height: 12px;
  border: 1.5px solid var(--accent);
  border-radius: 50%;
  opacity: 0.7;
}

.logo-atom::before { transform: rotate(-30deg); }
.logo-atom::after { transform: rotate(30deg); }

.logo-nucleus {
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  position: relative;
  z-index: 1;
  box-shadow: 0 0 8px var(--accent);
}

.logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--text);
  white-space: nowrap;
}

.logo-brand {
  color: var(--accent);
  font-style: italic;
}

.logo-accent-s {
  color: var(--accent);
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-pill {
  font-size: 12px;
  font-weight: 400;
  color: var(--text-muted);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 100px;
  letter-spacing: 0.04em;
  transition: all 0.2s;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
}

.nav-pill:hover {
  color: var(--text);
  background: rgba(255,255,255,0.05);
}

.contact-pill {
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
  padding: 7px 18px;
  border-radius: 100px;
  border: 1px solid var(--glass-border-bright);
  background: var(--accent-soft);
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Outfit', sans-serif;
  letter-spacing: 0.03em;
}

.contact-pill:hover {
  background: var(--accent-dim);
  box-shadow: 0 0 16px var(--accent-glow);
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(2,5,15,0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.modal-backdrop.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: rgba(8,16,36,0.92);
  border: 1px solid var(--glass-border-bright);
  border-radius: 24px;
  padding: 2.5rem;
  width: min(400px, calc(100vw - 3rem));
  box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 60px rgba(95,168,227,0.08);
  transform: translateY(16px) scale(0.97);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.modal-backdrop.open .modal {
  transform: translateY(0) scale(1);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.75rem;
}

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 400;
  color: var(--text);
}

.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.modal-close:hover {
  color: var(--text);
  border-color: var(--glass-border-bright);
}

.contact-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--accent-soft);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}

.contact-row:hover {
  border-color: var(--glass-border-bright);
}

.contact-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.contact-icon.discord { background: rgba(88,101,242,0.2); }
.contact-icon.email { background: var(--accent-dim); }

.contact-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 2px;
}

.contact-value { font-size: 14px; color: var(--text); }
.contact-value a { color: var(--accent); text-decoration: none; }
.contact-value a:hover { text-decoration: underline; }

main {
  position: relative;
  z-index: 2;
  padding-top: calc(18px + 52px + 2.5rem);
  padding-bottom: 5rem;
  max-width: 640px;
  margin: 0 auto;
  padding-left: 1.25rem;
  padding-right: 1.25rem;
}

.hero {
  text-align: center;
  margin-bottom: 1rem;
}

.hero-label {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.75rem;
}

.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  line-height: 1.1;
  color: var(--text);
}

.hero h1 em {
  font-style: italic;
  color: var(--accent);
}

.hero-quote-author {
  margin-top: 0.85rem;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
}

.glass-card {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 24px 60px rgba(0,0,0,0.5);
  margin-bottom: 1.5rem;
  padding: 2rem 1.75rem;
  overflow: hidden;
  position: relative;
}

.glass-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 15%;
  right: 15%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(95,168,227,0.3), transparent);
}

.mode-tabs {
  display: flex;
  background: var(--surface-inner);
  border-radius: 14px;
  padding: 4px;
  gap: 3px;
  margin-bottom: 2rem;
  border: 1px solid var(--glass-border);
}

.mode-tab {
  flex: 1;
  padding: 8px 10px;
  border: none;
  border-radius: 11px;
  background: transparent;
  color: var(--text-muted);
  font-family: 'Outfit', sans-serif;
  font-size: 12.5px;
  font-weight: 400;
  cursor: pointer;
  transition: all 0.22s;
}

.mode-tab.active {
  background: rgba(95,168,227,0.14);
  color: var(--accent);
  border: 1px solid var(--glass-border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 12px rgba(95,168,227,0.1);
}

.clock-face {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 2rem;
}

.clock-ring {
  position: relative;
  width: 230px;
  height: 230px;
  margin-bottom: 0.5rem;
}

.clock-ring svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.ring-track { fill: none; stroke: rgba(95,168,227,0.08); stroke-width: 5; }
.ring-glow { fill: none; stroke: rgba(95,168,227,0.12); stroke-width: 14; stroke-linecap: round; }
.ring-prog { fill: none; stroke: var(--accent); stroke-width: 4.5; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }

.clock-display {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

#clockDisplay {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 200;
  font-size: 50px;
  letter-spacing: -0.03em;
  color: var(--text);
  line-height: 1;
  text-shadow: 0 0 40px rgba(95,168,227,0.25);
  transition: font-size 0.3s;
}

#clockDisplay.hms { font-size: 38px; }

.session-label {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: 0.7;
}

.timer-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
}

.ctrl-btn {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 1px solid var(--glass-border);
  background: var(--surface-inner);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.ctrl-btn:hover {
  color: var(--accent);
  border-color: var(--glass-border-bright);
  box-shadow: 0 0 14px var(--accent-glow);
}

.play-btn {
  width: 62px;
  height: 62px;
  border-radius: 50%;
  border: 1.5px solid var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.play-btn:hover {
  background: var(--accent);
  color: #030b18;
  box-shadow: 0 0 30px var(--accent-glow), 0 0 60px rgba(95,168,227,0.15);
  transform: scale(1.06);
}

.play-btn:active { transform: scale(0.95); }
.play-btn.running { background: rgba(95,168,227,0.06); }

.settings-toggle {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  width: 100%;
  margin-top: 1.25rem;
  padding: 8px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.2s;
}

.settings-toggle:hover { color: var(--text-muted); }
.settings-caret { transition: transform 0.3s; }
.settings-toggle.open .settings-caret { transform: rotate(180deg); }

.settings-panel {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s;
}

.settings-panel.open {
  max-height: 240px;
  opacity: 1;
}

.settings-inner {
  border-top: 1px solid var(--glass-border);
  margin-top: 0.5rem;
  padding-top: 1.25rem;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}

.setting-group label {
  display: block;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 7px;
  text-align: center;
}

.setting-group input[type="number"] {
  width: 100%;
  background: var(--surface-inner);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 300;
  text-align: center;
  padding: 10px 8px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -moz-appearance: textfield;
}

.setting-group input::-webkit-outer-spin-button,
.setting-group input::-webkit-inner-spin-button {
  -webkit-appearance: none;
}

.setting-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.settings-apply {
  grid-column: 1 / -1;
  padding: 11px;
  background: var(--accent-dim);
  border: 1px solid var(--glass-border-bright);
  border-radius: 12px;
  color: var(--accent);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.settings-apply:hover {
  background: var(--accent);
  color: #030b18;
  box-shadow: 0 0 20px var(--accent-glow);
}

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 400;
  color: var(--text);
}

.add-task-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  background: var(--accent-soft);
  border: 1px solid var(--glass-border);
  border-radius: 100px;
  color: var(--accent);
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.add-task-btn:hover {
  background: var(--accent-dim);
  border-color: var(--glass-border-bright);
  box-shadow: 0 0 16px var(--accent-glow);
}

.task-input-wrap {
  display: none;
  margin-bottom: 12px;
  gap: 8px;
  animation: slideDown 0.2s ease;
}

.task-input-wrap.show { display: flex; }

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

.task-input {
  flex: 1;
  background: var(--surface-inner);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.task-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

.task-input::placeholder { color: var(--text-dim); }

.task-submit {
  padding: 10px 18px;
  background: var(--accent);
  border: none;
  border-radius: 12px;
  color: #030b18;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s, box-shadow 0.2s;
}

.task-submit:hover {
  opacity: 0.85;
  box-shadow: 0 0 20px var(--accent-glow);
}

.task-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface-inner);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 13px 15px;
  transition: all 0.25s;
  animation: taskIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes taskIn {
  from { opacity: 0; transform: scale(0.94) translateY(8px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.task-item:hover { border-color: var(--glass-border-bright); }
.task-item.done { opacity: 0.4; }

.task-check {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1.5px solid var(--glass-border-bright);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.task-check:hover {
  border-color: var(--green);
  box-shadow: 0 0 8px rgba(80,220,150,0.3);
}

.task-check.checked {
  background: var(--green);
  border-color: var(--green);
  box-shadow: 0 0 14px rgba(80,220,150,0.4);
}

.task-check.checked::after {
  content: '';
  width: 5px;
  height: 9px;
  border: 2px solid #030b18;
  border-top: none;
  border-left: none;
  transform: rotate(45deg) translate(-1px,-1px);
}

.task-text {
  flex: 1;
  font-size: 14px;
  color: var(--text);
  transition: all 0.3s;
}

.task-item.done .task-text {
  text-decoration: line-through;
  color: var(--text-dim);
}

.task-delete {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: all 0.2s;
}

.task-item:hover .task-delete { opacity: 1; }

.task-delete:hover {
  background: rgba(220,90,90,0.12);
  color: var(--red);
}

.empty-state {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--text-dim);
  font-size: 14px;
  border: 1px dashed var(--glass-border);
  border-radius: 14px;
}

.empty-state p:first-child {
  font-size: 22px;
  margin-bottom: 6px;
  opacity: 0.5;
}

.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(8,16,36,0.92);
  border: 1px solid var(--glass-border-bright);
  border-radius: 100px;
  padding: 12px 24px;
  font-size: 14px;
  color: var(--text);
  z-index: 3000;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
  white-space: nowrap;
  backdrop-filter: blur(20px);
}

.toast.show {
  transform: translateX(-50%) translateY(0);
}

#confetti-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
}

@media (max-width: 560px) {
  header {
    width: calc(100vw - 1.25rem);
    max-width: calc(100vw - 1.25rem);
  }

  .header-pill {
    flex-wrap: wrap;
    justify-content: center;
    padding: 12px 14px;
    border-radius: 24px;
  }

  .header-nav {
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  main {
    padding-top: 9.5rem;
  }

  .logo-text { font-size: 14px; }
  #clockDisplay { font-size: 40px; }
  #clockDisplay.hms { font-size: 30px; }
  .clock-ring { width: 190px; height: 190px; }
  .settings-inner { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>
<canvas id="confetti-canvas"></canvas>

<header>
  <div class="header-stack">
    <div class="header-pill">
      <a href="#" class="logo-wrap">
        <div class="logo-atom"><div class="logo-nucleus"></div></div>
        <span class="logo-text"><span class="logo-brand">Electron</span><span class="logo-accent-s">'s</span> Timepiece</span>
      </a>
      <nav class="header-nav">
        <a href="#timer" class="nav-pill">Timer</a>
        <a href="#tasks" class="nav-pill">Tasks</a>

<script>
const backdrop = document.getElementById('modalBackdrop');
document.getElementById('contactBtn').addEventListener('click', () => backdrop.classList.add('open'));
document.getElementById('modalClose').addEventListener('click', () => backdrop.classList.remove('open'));
backdrop.addEventListener('click', event => {
  if (event.target === backdrop) backdrop.classList.remove('open');
});
document.addEventListener('keydown', event => {
  if (event.key === 'Escape') backdrop.classList.remove('open');
});

const QUOTES = [
  { t: "The secret of getting ahead is getting started.", a: "Mark Twain" },
  { t: "It always seems impossible until it's done.", a: "Nelson Mandela" },
  { t: "Don't watch the clock; do what it does. Keep going.", a: "Sam Levenson" },
  { t: "You don't have to be great to start, but you have to start to be great.", a: "Zig Ziglar" },
  { t: "Concentrate all your thoughts upon the work at hand.", a: "Alexander Graham Bell" },
  { t: "Either you run the day, or the day runs you.", a: "Jim Rohn" },
  { t: "Your future is created by what you do today, not tomorrow.", a: "Robert Kiyosaki" },
  { t: "The way to get started is to quit talking and begin doing.", a: "Walt Disney" },
  { t: "Focus is the art of knowing what to ignore.", a: "James Clear" },
  { t: "Deep work is the superpower of the 21st century.", a: "Cal Newport" },
  { t: "Done is better than perfect.", a: "Sheryl Sandberg" },
  { t: "Energy and persistence conquer all things.", a: "Benjamin Franklin" }
];

const STORAGE_KEYS = {
  tasks: 'electron-timepiece.tasks',
  timer: 'electron-timepiece.timer'
};

const DEFAULT_DURATIONS = {
  focus: 25,
  short: 5,
  long: 15
};

const MAX_DURATIONS = {
  focus: 600,
  short: 120,
  long: 240
};

const LABELS = {
  focus: 'FOCUS',
  short: 'SHORT BREAK',
  long: 'LONG BREAK'
};

const quoteTextEl = document.getElementById('quoteText');
const quoteAuthorEl = document.getElementById('quoteAuthor');

function renderRandomQuote() {
  const quote = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  quoteTextEl.textContent = quote.t;
  quoteAuthorEl.textContent = quote.a;
}

renderRandomQuote();

let durations = { ...DEFAULT_DURATIONS };
let mode = 'focus';
let totalSec = DEFAULT_DURATIONS.focus * 60;
let remaining = DEFAULT_DURATIONS.focus * 60;
let running = false;
let intervalId = null;
let tasks = [];

const C = 2 * Math.PI * 102;
const ringProg = document.getElementById('ringProg');
const ringGlow = document.getElementById('ringGlow');
const clockEl = document.getElementById('clockDisplay');
const sessEl = document.getElementById('sessionLabel');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const pauseIcon = document.getElementById('pauseIcon');
const toast = document.getElementById('toast');
const focusInput = document.getElementById('focusDur');
const shortInput = document.getElementById('shortDur');
const longInput = document.getElementById('longDur');
const settingsToggle = document.getElementById('settingsToggle');
const settingsPanel = document.getElementById('settingsPanel');
const addTaskBtn = document.getElementById('addTaskBtn');
const taskInputWrap = document.getElementById('taskInputWrap');
const taskInput = document.getElementById('taskInput');
const taskList = document.getElementById('taskList');

ringProg.style.strokeDasharray = C;
ringGlow.style.strokeDasharray = C;
ringGlow.style.strokeDashoffset = 0;
ringGlow.style.opacity = 0;

function sanitizeDuration(value, fallback, max) {
  const parsed = Number.parseInt(value, 10);
  if (!Number.isFinite(parsed)) return fallback;
  return Math.min(max, Math.max(1, parsed));
}

function syncDurationInputs() {
  focusInput.value = durations.focus;
  shortInput.value = durations.short;
  longInput.value = durations.long;
}

function syncModeTabs() {
  document.querySelectorAll('.mode-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.mode === mode);
  });
}

function formatTime(seconds) {
  if (seconds >= 3600) {
    const hours = Math.floor(seconds / 3600);
    const minutes = Math.floor((seconds % 3600) / 60);
    const secs = seconds % 60;
    return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
  }

  return `${String(Math.floor(seconds / 60)).padStart(2, '0')}:${String(seconds % 60).padStart(2, '0')}`;
}

function updateDisplay() {
  const timeText = formatTime(remaining);
  const progress = totalSec ? remaining / totalSec : 0;
  clockEl.textContent = timeText;
  clockEl.classList.toggle('hms', remaining >= 3600);
  sessEl.textContent = LABELS[mode];
  document.title = `${timeText} | Electron's Timepiece`;
  ringProg.style.strokeDashoffset = C * (1 - progress);
  ringGlow.style.strokeDashoffset = C * (1 - progress);
  ringGlow.style.opacity = running ? 0.6 : 0;
}

function setPlayState(nextRunning) {
  running = nextRunning;
  playBtn.classList.toggle('running', nextRunning);
  playIcon.style.display = nextRunning ? 'none' : '';
  pauseIcon.style.display = nextRunning ? '' : 'none';
}

function clearTimerInterval() {
  if (intervalId !== null) {
    window.clearInterval(intervalId);
    intervalId = null;
  }
}

function saveTimerState() {
  const timerState = {
    mode,
    durations,
    totalSec,
    remaining,
    running,
    savedAt: Date.now()
  };

  localStorage.setItem(STORAGE_KEYS.timer, JSON.stringify(timerState));
}

function loadTimerState() {
  const savedTimer = localStorage.getItem(STORAGE_KEYS.timer);
  let shouldResume = false;

  if (savedTimer) {
    try {
      const timerState = JSON.parse(savedTimer);
      durations = {
        focus: sanitizeDuration(timerState.durations?.focus, DEFAULT_DURATIONS.focus, MAX_DURATIONS.focus),
        short: sanitizeDuration(timerState.durations?.short, DEFAULT_DURATIONS.short, MAX_DURATIONS.short),
        long: sanitizeDuration(timerState.durations?.long, DEFAULT_DURATIONS.long, MAX_DURATIONS.long)
      };

      mode = Object.prototype.hasOwnProperty.call(LABELS, timerState.mode) ? timerState.mode : 'focus';
      totalSec = durations[mode] * 60;

      const savedRemaining = Number.parseInt(timerState.remaining, 10);
      remaining = Number.isFinite(savedRemaining)
        ? Math.min(Math.max(savedRemaining, 0), totalSec)
        : totalSec;

      shouldResume = Boolean(timerState.running);
      const savedAt = Number(timerState.savedAt);

      if (shouldResume && Number.isFinite(savedAt)) {
        const elapsedSeconds = Math.max(0, Math.floor((Date.now() - savedAt) / 1000));
        remaining = Math.max(remaining - elapsedSeconds, 0);
        shouldResume = remaining > 0;
      }
    } catch (error) {
      durations = { ...DEFAULT_DURATIONS };
      mode = 'focus';
      totalSec = DEFAULT_DURATIONS.focus * 60;
      remaining = totalSec;
      shouldResume = false;
    }
  }

  totalSec = durations[mode] * 60;
  remaining = Math.min(remaining, totalSec);
  syncDurationInputs();
  syncModeTabs();
  setPlayState(shouldResume);
  updateDisplay();

  if (running) {
    intervalId = window.setInterval(tick, 1000);
  }

  saveTimerState();
}

function setMode(nextMode) {
  mode = nextMode;
  totalSec = durations[nextMode] * 60;
  remaining = totalSec;
  clearTimerInterval();
  setPlayState(false);
  syncModeTabs();
  updateDisplay();
  saveTimerState();
}

function showToast() {
  const messages = [
    'Session complete. Great focus.',
    'Time to breathe. You earned it.',
    'Another session finished strong.',
    'Flow state achieved. Rest now.'
  ];

  toast.textContent = messages[Math.floor(Math.random() * messages.length)];
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

function tick() {
  if (remaining > 0) remaining--;

  if (remaining <= 0) {
    remaining = 0;
    clearTimerInterval();
    setPlayState(false);
    updateDisplay();
    saveTimerState();
    showToast();
    return;
  }

  updateDisplay();
  saveTimerState();
}

function startTimer() {
  if (remaining === 0) remaining = totalSec;
  clearTimerInterval();
  setPlayState(true);
  updateDisplay();
  saveTimerState();
  intervalId = window.setInterval(tick, 1000);
}

function pauseTimer() {
  clearTimerInterval();
  setPlayState(false);
  updateDisplay();
  saveTimerState();
}

function createTaskId() {
  if (window.crypto && typeof window.crypto.randomUUID === 'function') {
    return window.crypto.randomUUID();
  }

  return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEYS.tasks, JSON.stringify(tasks));
}

function loadTasks() {
  const savedTasks = localStorage.getItem(STORAGE_KEYS.tasks);

  if (!savedTasks) {
    tasks = [];
    return;
  }

  try {
    const parsed = JSON.parse(savedTasks);
    tasks = Array.isArray(parsed)
      ? parsed
          .map(task => ({
            id: String(task.id || createTaskId()),
            text: typeof task.text === 'string' ? task.text.trim() : '',
            done: Boolean(task.done)
          }))
          .filter(task => task.text)
      : [];
  } catch (error) {
    tasks = [];
  }
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderTasks() {
  if (!tasks.length) {
    taskList.innerHTML = '<div class="empty-state"><p>&#9672;</p><p>No tasks yet. Add one above.</p></div>';
    return;
  }

  taskList.innerHTML = [...tasks]
    .sort((a, b) => a.done - b.done)
    .map(task => `
      <div class="task-item ${task.done ? 'done' : ''}" data-id="${task.id}">
        <button class="task-check ${task.done ? 'checked' : ''}" data-action="toggle"></button>
        <span class="task-text">${escapeHtml(task.text)}</span>
        <button class="task-delete" data-action="delete" title="Remove">
          <svg width="11" height="11" fill="none" viewBox="0 0 11 11">
            <path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    `)
    .join('');

  taskList.querySelectorAll('.task-item').forEach(item => {
    const id = item.dataset.id;
    item.querySelector('[data-action="toggle"]').addEventListener('click', () => toggleTask(id));
    item.querySelector('[data-action="delete"]').addEventListener('click', () => deleteTask(id));
  });
}

function addTask() {
  const text = taskInput.value.trim();
  if (!text) return;

  tasks.push({ id: createTaskId(), text, done: false });
  taskInput.value = '';
  taskInputWrap.classList.remove('show');
  saveTasks();
  renderTasks();
}

function toggleTask(id) {
  const task = tasks.find(item => item.id === id);
  if (!task) return;

  task.done = !task.done;
  if (task.done) launchConfetti();
  saveTasks();
  renderTasks();
}

function deleteTask(id) {
  tasks = tasks.filter(task => task.id !== id);
  saveTasks();
  renderTasks();
}

playBtn.addEventListener('click', () => {
  if (running) pauseTimer();
  else startTimer();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  clearTimerInterval();
  setPlayState(false);
  remaining = totalSec;
  updateDisplay();
  saveTimerState();
});

document.getElementById('skipBtn').addEventListener('click', () => {
  clearTimerInterval();
  setPlayState(false);
  remaining = 0;
  updateDisplay();
  saveTimerState();
  showToast();
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => setMode(tab.dataset.mode));
});

settingsToggle.addEventListener('click', () => {
  const open = settingsPanel.classList.toggle('open');
  settingsToggle.classList.toggle('open', open);
});

document.getElementById('applySettings').addEventListener('click', () => {
  durations = {
    focus: sanitizeDuration(focusInput.value, DEFAULT_DURATIONS.focus, MAX_DURATIONS.focus),
    short: sanitizeDuration(shortInput.value, DEFAULT_DURATIONS.short, MAX_DURATIONS.short),
    long: sanitizeDuration(longInput.value, DEFAULT_DURATIONS.long, MAX_DURATIONS.long)
  };

  syncDurationInputs();
  setMode(mode);
  settingsPanel.classList.remove('open');
  settingsToggle.classList.remove('open');
});

addTaskBtn.addEventListener('click', () => {
  taskInputWrap.classList.toggle('show');
  if (taskInputWrap.classList.contains('show')) taskInput.focus();
});

document.getElementById('taskSubmit').addEventListener('click', addTask);
taskInput.addEventListener('keydown', event => {
  if (event.key === 'Enter') addTask();
  if (event.key === 'Escape') taskInputWrap.classList.remove('show');
});

loadTimerState();
loadTasks();
renderTasks();

window.addEventListener('beforeunload', () => {
  saveTimerState();
  saveTasks();
});

const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let animId = null;

function resizeCanvas() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const COLORS = ['#5fa8e3', '#7ac9b8', '#c97ac9', '#e3a85f', '#a8e35f', '#e35fa8', '#e0ecff', '#5fe3c9'];

function makeParticle(x, y) {
  return {
    x,
    y,
    vx: (Math.random() - 0.5) * 14,
    vy: Math.random() * -14 - 5,
    rot: Math.random() * 360,
    rv: (Math.random() - 0.5) * 10,
    w: Math.random() * 9 + 3,
    h: Math.random() * 5 + 2,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    life: 1
  };
}

function launchConfetti() {
  const centerX = innerWidth / 2;
  const centerY = innerHeight * 0.45;

  for (let index = 0; index < 110; index += 1) {
    particles.push(makeParticle(
      centerX + (Math.random() - 0.5) * 240,
      centerY + (Math.random() - 0.5) * 80
    ));
  }

  if (!animId) animateConfetti();
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(particle => particle.life > 0.01);

  particles.forEach(particle => {
    particle.x += particle.vx;
    particle.y += particle.vy;
    particle.vy += 0.38;
    particle.vx *= 0.98;
    particle.rot += particle.rv;
    particle.life -= 0.013;

    ctx.save();
    ctx.globalAlpha = Math.max(0, particle.life);
    ctx.translate(particle.x, particle.y);
    ctx.rotate(particle.rot * Math.PI / 180);
    ctx.fillStyle = particle.color;
    ctx.fillRect(-particle.w / 2, -particle.h / 2, particle.w, particle.h);
    ctx.restore();
  });

  if (particles.length) {
    animId = requestAnimationFrame(animateConfetti);
  } else {
    animId = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
}
</script>
